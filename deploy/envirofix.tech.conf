# Host-level nginx vhost for envirofix.tech.
# Install to /etc/nginx/sites-available/envirofix.tech.conf on the EC2 instance,
# then run certbot --nginx to add the TLS server block automatically.
#
# This proxies everything to the frontend container (127.0.0.1:3000), which
# serves the SPA and internally forwards /api/ to the backend container over
# the Docker network (see frontend/nginx.conf) — so this file never needs to
# know about the backend container directly.

server {
    listen 80;
    listen [::]:80;
    server_name envirofix.tech;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
